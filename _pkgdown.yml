# _pkgdown.yml

# ------------------------------------------------------------------
# Site information
# ------------------------------------------------------------------
title: "VaccineValidateR"
description: "Tools to validate and evaluate childhood immunization data according to US ACIP guidelines."
url: "https://psyllix.github.io/VaccineValidateR"

# ------------------------------------------------------------------
# Template settings for offline site
# ------------------------------------------------------------------
template:
  bootstrap: 5
  assets: local
  headroom: false
  extra_js: []

# ------------------------------------------------------------------
# Reference section (all exported functions)
# ------------------------------------------------------------------
reference:
  - title: "Functions"
    desc: "All exported functions in VaccineValidateR."
    contents:
      - create_cohort
      - select_immunizations
      - validate_immunizations
      - evaluate_visits
      - evaluate_population
      - summarize_population
      - summarize_visits
      - build_cvx_map
      - cvx
      - supported_antigens
      - update_cvx_map
      - apply_dob

# ------------------------------------------------------------------
# Articles / Vignettes
# ------------------------------------------------------------------
articles:
  - title: "Introduction to VaccineValidateR"
    desc: "Overview and workflow for VaccineValidateR."
    contents:
      - intro # intro information
  - title: "Dose Reference Tables"
    desc: "Overview of the interval calculations used in the project."
    contents:
      - dose_reference #creates the table for the doses

# ------------------------------------------------------------------
# Development mode (offline compatible)
# ------------------------------------------------------------------
development:
  mode: "release"  # use one of auto, default, release, devel, unreleased
